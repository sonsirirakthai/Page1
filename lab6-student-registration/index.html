<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
  </style>
</head>
<body class="bg-gray-100">

<nav class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-5xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-lg font-bold">Student Registration</h1>
    <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      ลงทะเบียน
    </button>
  </div>
</nav>

<div class="flex justify-center items-center min-h-screen px-4">
  <div class="bg-white p-6 rounded-lg shadow w-full max-w-2xl">

    <h2 class="text-2xl font-semibold mb-4 text-center">ลงทะเบียนนักศึกษา</h2>

    <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div class="md:col-span-2">
        <label class="block mb-1">ชื่อ-นามสกุล</label>
        <input type="text" name="name" placeholder="ชื่อ-นามสกุล"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500" required>
      </div>

      <div>
        <label class="block mb-1">รหัสนักศึกษา</label>
        <input type="text" name="studentId" placeholder="รหัสนักศึกษา"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500" required>
      </div>

      <div>
        <label class="block mb-1">คณะ/สาขา</label>
        <input type="text" name="department" placeholder="คณะ/สาขา"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500" required>
      </div>

      <div class="md:col-span-2">
        <label class="block mb-1">Email</label>
        <input type="email" name="email" placeholder="example@email.com"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500" required>
      </div>

      <div class="md:col-span-2">
        <button type="submit"
          class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
          ส่งข้อมูล
        </button>
      </div>

    </form>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
